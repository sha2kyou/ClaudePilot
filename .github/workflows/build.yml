name: Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode Version (Selected)
        run: xcodebuild -version

      - name: Build (Release)
        run: |
          xcodebuild \
            -project "ClaudePilot.xcodeproj" \
            -scheme "ClaudePilot" \
            -configuration "Release" \
            -sdk "macosx" \
            -destination "platform=macOS" \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .dmg
        run: |
          APP_PATH="${RUNNER_TEMP}/DerivedData/Build/Products/Release/ClaudePilot.app"
          OUTPUT_DMG_VERSIONED="${RUNNER_TEMP}/ClaudePilot-${GITHUB_REF_NAME}.dmg"
          test -d "${APP_PATH}"
          hdiutil create \
            -volname "ClaudePilot" \
            -srcfolder "${APP_PATH}" \
            -ov \
            -format UDZO \
            "${OUTPUT_DMG_VERSIONED}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudePilot-${{ github.ref_name }}
          path: ${{ runner.temp }}/ClaudePilot-${{ github.ref_name }}.dmg
          if-no-files-found: error

  release:
    name: Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudePilot-${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudePilot-${{ github.ref_name }}.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check Tap Token
        id: token
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "run_update=false" >> "${GITHUB_OUTPUT}"
            echo "HOMEBREW_TAP_TOKEN is empty, skip tap update."
          else
            echo "run_update=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download Artifact
        if: ${{ steps.token.outputs.run_update == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ClaudePilot-${{ github.ref_name }}

      - name: Compute Version and SHA256
        if: ${{ steps.token.outputs.run_update == 'true' }}
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DMG_NAME="ClaudePilot-${TAG}.dmg"
          SHA256="$(shasum -a 256 "${DMG_NAME}" | awk '{print $1}')"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Tap Repository
        if: ${{ steps.token.outputs.run_update == 'true' }}
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/sha2kyou/homebrew-tap.git" tap

      - name: Update Cask File
        if: ${{ steps.token.outputs.run_update == 'true' }}
        run: |
          cat > tap/Casks/claudepilot.rb <<EOF
          cask "claudepilot" do
            version "${{ steps.vars.outputs.version }}"
            sha256 "${{ steps.vars.outputs.sha256 }}"

            url "https://github.com/sha2kyou/ClaudePilot/releases/download/v#{version}/ClaudePilot-v#{version}.dmg",
                verified: "github.com/sha2kyou/ClaudePilot/"
            name "ClaudePilot"
            desc "Menu bar trigger manager for Claude Desktop"
            homepage "https://github.com/sha2kyou/ClaudePilot"

            auto_updates true
            app "ClaudePilot.app"

            postflight do
              app_path = "#{appdir}/ClaudePilot.app"
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", app_path] if File.exist?(app_path)
            end

            zap trash: [
              "~/Library/Application Support/ClaudePilot",
              "~/Library/Preferences/cn.tr1ck.ClaudePilot.plist",
              "~/Library/Saved Application State/cn.tr1ck.ClaudePilot.savedState",
            ]
          end
          EOF

      - name: Commit and Push Tap Changes
        if: ${{ steps.token.outputs.run_update == 'true' }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/claudepilot.rb
          if git diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git commit -m "chore(cask): update claudepilot for ${GITHUB_REF_NAME}"
          git push
