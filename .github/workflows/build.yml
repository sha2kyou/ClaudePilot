name: Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode Version (Selected)
        run: xcodebuild -version

      - name: Build (Release)
        run: |
          xcodebuild \
            -project "ClaudePilot.xcodeproj" \
            -scheme "ClaudePilot" \
            -configuration "Release" \
            -sdk "macosx" \
            -destination "platform=macOS" \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .dmg
        run: |
          APP_PATH="${RUNNER_TEMP}/DerivedData/Build/Products/Release/ClaudePilot.app"
          OUTPUT_DMG_VERSIONED="${RUNNER_TEMP}/ClaudePilot-${GITHUB_REF_NAME}.dmg"
          OUTPUT_DMG_LATEST="${RUNNER_TEMP}/ClaudePilot-latest.dmg"
          test -d "${APP_PATH}"
          hdiutil create \
            -volname "ClaudePilot" \
            -srcfolder "${APP_PATH}" \
            -ov \
            -format UDZO \
            "${OUTPUT_DMG_VERSIONED}"
          cp "${OUTPUT_DMG_VERSIONED}" "${OUTPUT_DMG_LATEST}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudePilot-${{ github.ref_name }}
          path: |
            ${{ runner.temp }}/ClaudePilot-${{ github.ref_name }}.dmg
            ${{ runner.temp }}/ClaudePilot-latest.dmg
          if-no-files-found: error

  release:
    name: Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudePilot-${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClaudePilot-${{ github.ref_name }}.dmg
            ClaudePilot-latest.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
